spring:
  application:
    name: blog-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/blog_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
  mail:
    host: localhost
    port: 1025
    username: 
    password: 

jwt:
  secret: your-secret-key-change-in-production
  expiration: 86400000

cloudflare:
  r2:
    endpoint: https://your-account.r2.cloudflarestorage.com
    bucket-name: blog-images
    access-key-id: 
    secret-access-key: 

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.blog: DEBUG
