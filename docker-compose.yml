services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: blog-postgres
    environment:
      POSTGRES_DB: blog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blog-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    image: maven:3.8-openjdk-11
    container_name: blog-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/blog_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: your-secret-key-change-in-production
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blog-network
    command: mvn spring-boot:run

  # Frontend Service
  frontend:
    image: node:18-alpine
    container_name: blog-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      DOCKER_MODE: "true"
    ports:
      - "3000:3000"
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - blog-network
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"

  # MailHog for Email Testing (Optional)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: blog-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - blog-network

volumes:
  postgres_data:

networks:
  blog-network:
    driver: bridge
